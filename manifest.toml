
packaging_format = 2

id = "gonic"
name = "Gonic"
description.en = "Music streaming server / free-software subsonic server API implementation"
description.fr = "Serveur de streaming de musique / implémentation libre de l'API Subsonic"

version = "0.20.1~ynh1"

maintainers = ["otm33GH"]

[upstream]
license = "AGPL-3.0-only"
admindoc = "https://github.com/sentriz/gonic/wiki"
userdoc = "https://github.com/sentriz/gonic/wiki"
code = "https://github.com/sentriz/gonic"


[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["amd64","arm64"]
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources]

    [resources.sources.main]

    amd64.url = "https://github.com/sentriz/gonic/releases/download/v0.20.1/gonic-linux-amd64-v0.20.1"    
    amd64.sha256 = "5895761a2c279cd74e37dbfbb93ec299ac4439e6944d206e0f8c39c078b75142"
    arm64.url = "https://github.com/sentriz/gonic/releases/download/v0.20.1/gonic-linux-arm64-v0.20.1"    
    arm64.sha256 = "043d190d4abd0747dc659dca4684b873ddd67b4979ecb7f28b2098cd9e49f0e3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "gonic-linux-amd64-.*"
    autoupdate.asset.arm64 = "gonic-linux-arm64-.*"

    rename = "gonic"

    [resources.system_user]

    [resources.install_dir]


    [resources.data_dir]
    subdirs = ["music", "podcast", "playlists", "database"]

    [resources.permissions]

    main.url = "/"

    [resources.ports]

    [resources.apt]

    packages = "ffmpeg mpv"